name: API Testing framework

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
       contents: read
       checks: write
       issues: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: maven
    - name: Execute Test
      run: mvn test -Dsuite=Testng

    - name: Upload a Build Artifact
      if : always()
      uses: actions/upload-artifact@v7.0.1
      with:
       name: logs
       path: logs/

    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v1
      with:
       name: TestNG Results
       path: target/surefire-reports/junitreports/TEST-*.xml
       reporter: java-junit
